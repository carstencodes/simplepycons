---
name: Create release

on:
  workflow_call:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    name: Deploy wheel to pypi
    environment:
      name: pypi
      deployment: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.ref }}
    - name: Setup PDM
      uses: pdm-project/setup-pdm@v4
    - name: Install dependencies
      run: | 
        pdm install -d -G:all
        pdm install --plugins
    - name: Build and publish
      env:
        PDM_PUBLISH_USERNAME: ${{ secrets.PYPI_USERNAME }}
        PDM_PUBLISH_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        pdm publish

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ deploy ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-tags: true
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$(git describe --tags)" \
              --repo="$GITHUB_REPOSITORY" \
              --title="${GITHUB_REPOSITORY#*/} $(git describe --tags)" \
              --generate-notes
